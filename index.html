<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>萬軍系統專案狀態看板</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;

      background: linear-gradient(180deg, #eaf5ef 0, #f7f8f4 100%);

      width: min(92vw, 560px);
      border: 1px solid #d8e8e1;

      padding: 24px;

    h1 {

      font-size: 26px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 14px;

    }

      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #176b5d;
      color: #fff;
      padding: 9px 16px;
